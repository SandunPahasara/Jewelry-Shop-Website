server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index Homepage.html index.html;

    location / {
        try_files $uri $uri/ /Homepage.html;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|mp4|woff|woff2|ttf|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
